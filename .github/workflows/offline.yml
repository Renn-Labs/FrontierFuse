name: offline

# Keyless, offline-only CI. No API keys, no live model calls — mirrors FrontierFuse's boundary.
# Runs the stdlib-only contract aggregate (tests/run_contracts.py) + compile checks on the
# supported Python range (3.10, 3.12) on Linux and macOS. Also runs the offline pre-push
# equivalent (denylist, version metadata, public-release scrub) without provider CLIs.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile all modules
        run: python -m compileall -q frontier_common.py frontier_advisor.py frontier_advisor_mcp.py frontier_dispatch.py frontier_models.py frontier_update.py frontier_verify.py frontier_scrub.py frontier_topology.py frontier_openrouter.py hooks tests scripts      - name: Foundation smoke (no keys)
        run: python frontier_common.py
      - name: Public-release scrub (worktree)
        run: python scripts/public-release-scrub.py
      - name: Public-release scrub (all history)
        run: python scripts/public-release-scrub.py --all-history
      - name: Shared denylist (tracked paths)
        run: python scripts/release_denylist.py --check-tracked
      - name: Pre-push equivalent (offline + full-history scrub)
        # No claude/plugin validate, no live provider dry-runs. Public-release gates only.
        run: bash scripts/pre-push-check.sh --offline --all-history
      - name: Offline contract aggregate
        run: python tests/run_contracts.py
      - name: Runner self-test
        run: python tests/run_contracts.py --self-test
      - name: Doctor offline smoke
        # Doctor never contacts live providers. Bare GitHub runners lack codex/
        # claude/grok/gemini on PATH, so unstubbed doctor exits 1 (NOT READY). Force
        # universal body + advisor stubs to `echo` (always on PATH) and
        # isolate config/state so home/user settings cannot select a live CLI.
        # Require READY/exit 0 — never swallow doctor failures.
        env:
          FRONTIER_BODY_CMD: echo
          FRONTIER_ADVISOR_CMD: echo
          FRONTIER_GROK_CMD: echo
          FRONTIER_CONFIG_DIR: ${{ runner.temp }}/frontier-config
          FRONTIER_STATE_DIR: ${{ runner.temp }}/frontier-state
          FRONTIER_RUNS_DIR: ${{ runner.temp }}/frontier-runs
        run: |
          set +e
          out=$(python frontier_dispatch.py doctor 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -qE 'READY|NOT READY' \
            || { echo "doctor did not print READY/NOT READY status"; exit 1; }
          if [ "$rc" -ne 0 ]; then
            echo "doctor exited $rc; expected 0 with FRONTIER_BODY_CMD=echo stubs"
            exit 1
          fi
          printf '%s\n' "$out" | grep -q 'READY' \
            || { echo "doctor did not report READY under offline stubs"; exit 1; }
